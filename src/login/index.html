<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../output.css">
    <!-- npx @tailwindcss/cli -i ./src/input.css -o ./src/output.css --watch -->
    <title>Šachy Tovačov &raquo; Úvod</title>
</head>
<body class="bg-[#0a0a0a] text-[#dfdfdf] min-h-screen flex flex-col justify-center items-center">
    <h1 class="text-3xl font-semibold text-center mt-8">Šachy Tovačov &raquo; Admin Panel</h1>
    <section class="w-lg h-3xl  bg-[#1d1d1d] mt-12 p-3 rounded-xl">
        <h2 class="font-semibold text-xl">Přihlášení</h2>
        <form class="flex flex-col justify-center gap-5 p-3">
            <div class="flex flex-row flex-wrap justify-end gap-5">
                <!-- <label for="username-input" class="overflow-hidden">Přihlašovací jméno:</label> -->
                <input type="text" name="" id="username-input" class="bg-[#2d2d2d] w-full">
            </div>
            <div class="flex flex-row flex-wrap justify-start gap-5">
                <label for="password-input" class="overflow-hidden">Heslo:</label>
                <input type="password" name="" id="password-input" class="cursor-pointer bg-[#2d2d2d] p-1 rounded-md hover:bg-[#393939] transition-colors duration-all w-full">
            </div>
            <input type="submit" value="Přihlásit se" class="text-lg cursor-pointer bg-[#2d2d2d] p-2 rounded-lg hover:bg-[#393939] transition-colors duration-all">
        </form>
    </section>
</body>
</html>
